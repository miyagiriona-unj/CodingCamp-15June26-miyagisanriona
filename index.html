<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="dashboard-header">
    <nav class="dashboard-nav">
      <span class="dashboard-title">Dashboard</span>
      <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Switch to dark theme"
        type="button"
      >
        <span class="theme-icon" aria-hidden="true">☀️</span>
      </button>
    </nav>
  </header>

  <main class="dashboard-grid">

    <!-- Greeting Widget -->
    <section id="greeting-widget" class="widget widget--greeting" aria-label="Greeting and clock">
      <div class="widget__content">
        <p id="greeting-time" class="greeting-time">00:00:00</p>
        <p id="greeting-date" class="greeting-date">Loading date…</p>
        <h1 id="greeting-message" class="greeting-message">Good morning</h1>
      </div>
    </section>

    <!-- Timer Widget -->
    <section id="timer-widget" class="widget widget--timer" aria-label="Focus timer">
      <div class="widget__content">
        <h2 class="widget__heading">Focus Timer</h2>
        <p id="timer-display" class="timer-display" aria-live="polite" aria-atomic="true">25:00</p>
        <div class="timer-controls">
          <button id="timer-start" class="btn btn--primary" type="button" aria-label="Start timer">Start</button>
          <button id="timer-stop"  class="btn btn--secondary" type="button" aria-label="Stop timer" disabled>Stop</button>
          <button id="timer-reset" class="btn btn--secondary" type="button" aria-label="Reset timer">Reset</button>
        </div>
      </div>
    </section>

    <!-- Task List Widget -->
    <section id="tasklist-widget" class="widget widget--tasklist" aria-label="Task list">
      <div class="widget__content">
        <h2 class="widget__heading">Tasks</h2>
        <form id="task-add-form" class="input-row" novalidate>
          <label for="task-input" class="sr-only">New task</label>
          <input
            id="task-input"
            class="text-input"
            type="text"
            maxlength="200"
            placeholder="Add a task…"
            aria-label="New task text"
          />
          <button type="submit" class="btn btn--primary" aria-label="Add task">Add</button>
        </form>
        <p id="task-error" class="error-msg" aria-live="polite" hidden></p>
        <ul id="task-list" class="task-list" aria-label="Task list" role="list"></ul>
      </div>
    </section>

    <!-- Quick Links Widget -->
    <section id="quicklinks-widget" class="widget widget--quicklinks" aria-label="Quick links">
      <div class="widget__content">
        <h2 class="widget__heading">Quick Links</h2>
        <form id="link-add-form" class="input-row" novalidate>
          <label for="link-label-input" class="sr-only">Link label</label>
          <input
            id="link-label-input"
            class="text-input"
            type="text"
            maxlength="50"
            placeholder="Label"
            aria-label="Link label"
          />
          <label for="link-url-input" class="sr-only">Link URL</label>
          <input
            id="link-url-input"
            class="text-input"
            type="url"
            maxlength="2048"
            placeholder="https://example.com"
            aria-label="Link URL"
          />
          <button type="submit" class="btn btn--primary" aria-label="Add link">Add</button>
        </form>
        <p id="link-label-error" class="error-msg" aria-live="polite" hidden></p>
        <p id="link-url-error"   class="error-msg" aria-live="polite" hidden></p>
        <div id="links-container" class="links-container" aria-label="Saved links"></div>
      </div>
    </section>

    <!-- Settings Widget -->
    <section id="settings-widget" class="widget widget--settings" aria-label="Settings">
      <div class="widget__content">
        <h2 class="widget__heading">Settings</h2>

        <form id="name-form" class="settings-form" novalidate>
          <label for="name-input" class="settings-label">Your name</label>
          <div class="input-row">
            <input
              id="name-input"
              class="text-input"
              type="text"
              maxlength="50"
              placeholder="Enter your name"
              aria-label="Custom display name"
              aria-describedby="name-error"
            />
            <button type="submit" class="btn btn--primary" aria-label="Save name">Save</button>
          </div>
          <p id="name-error" class="error-msg" aria-live="polite" hidden></p>
        </form>

        <form id="duration-form" class="settings-form" novalidate>
          <label for="duration-input" class="settings-label">Timer duration (minutes)</label>
          <div class="input-row">
            <input
              id="duration-input"
              class="text-input"
              type="number"
              min="1"
              max="120"
              placeholder="25"
              aria-label="Timer duration in minutes"
              aria-describedby="duration-error"
            />
            <button type="submit" class="btn btn--primary" aria-label="Save timer duration">Save</button>
          </div>
          <p id="duration-error" class="error-msg" aria-live="polite" hidden></p>
        </form>
      </div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
